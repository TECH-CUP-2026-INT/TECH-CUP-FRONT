<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCup — Selección de rol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    overflow:hidden;
    background:transparent;
    min-height:100vh;
    font-family:'Inter',sans-serif;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:50px 20px;
  }
  .wrap{width:100%;max-width:1000px;position:relative;z-index:1;}
  .vid-bg{display:none;}
  .vid-overlay{display:none;}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    height:360px;
    border-radius:16px;
    overflow:hidden;
    margin-bottom:22px;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,0.12);
    display:flex;
    align-items:center;
  }
  .hero-glow{
    position:absolute;
    right:8%;
    bottom:-30%;
    width:60%;
    height:75%;
    border-radius:50%;
    filter:blur(60px);
    opacity:.4;
    background:radial-gradient(circle,#e8bd5f,transparent 70%);
    transition:opacity .5s ease, background .5s ease;
  }
  .hero-text{
    position:relative;
    z-index:2;
    padding:0 40px;
    max-width:52%;
  }
  .hero-eyebrow{
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:#9a8fc2;
    margin:0 0 10px;
    transition:opacity .3s ease;
  }
  .hero-title{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:800;
    font-size:clamp(32px,4.6vw,50px);
    margin:0 0 10px;
    letter-spacing:.01em;
    line-height:1;
    transition:color .3s ease;
  }
  .hero-title span{color:#e8bd5f;}
  .hero-sub{
    font-size:14.5px;
    color:rgba(255,255,255,0.68);
    line-height:1.6;
    margin:0;
    max-width:340px;
  }
  .hero-imgs{
    position:absolute;
    right:0;
    bottom:0;
    height:112%;
    width:56%;
    display:flex;
    align-items:flex-end;
    justify-content:center;
  }
  .hero-img{
    position:absolute;
    bottom:0;
    height:100%;
    opacity:0;
    transform:translateY(18px);
    transition:opacity .45s ease, transform .5s cubic-bezier(.2,.8,.2,1);
    filter:drop-shadow(0 20px 30px rgba(0,0,0,0.5));
  }
  .hero-img.active{ opacity:1; transform:translateY(0); }

  @media (max-width:640px){
    .hero{ height:300px; }
    .hero-text{ max-width:100%; padding:0 20px; }
    .hero-imgs{ width:100%; opacity:.25; }
  }

  /* ---------- STRIP SELECTOR ---------- */
  .stage{
    position:relative;
    width:100%;
    aspect-ratio:1200/669;
    border-radius:16px;
    overflow:hidden;
    background:rgba(0,0,0,0.2);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
    border:1px solid rgba(255,255,255,0.12);
  }
  .base{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:grayscale(65%) brightness(.5) saturate(.7);
    transition:filter .45s ease;
  }
  .zones{
    position:absolute;
    inset:0;
    display:flex;
  }
  .zone{
    position:relative;
    flex:1 1 25%;
    height:100%;
    overflow:hidden;
    cursor:pointer;
    border:none;
    padding:0;
    background:transparent;
    -webkit-tap-highlight-color:transparent;
    transition:transform .4s cubic-bezier(.2,.8,.2,1);
    transform-origin:center bottom;
  }
  .zone:hover, .zone:focus-visible{ transform:scale(1.035); z-index:2; }

  .zone:nth-child(1) .spot{ transform:translateX(0%); }
  .zone:nth-child(2) .spot{ transform:translateX(-33.333%); }
  .zone:nth-child(3) .spot{ transform:translateX(-66.666%); }
  .zone:hover .spot, .zone:focus-visible .spot, .zone.selected .spot{ opacity:1; }

  .light{
    position:absolute;
    left:50%;
    bottom:0;
    width:130%;
    height:55%;
    transform:translateX(-50%);
    border-radius:50%;
    filter:blur(30px);
    opacity:0;
    transition:opacity .45s ease;
    pointer-events:none;
  }
  .zone:hover .light, .zone:focus-visible .light, .zone.selected .light{ opacity:.55; }

  .content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:16px;
    pointer-events:none;
  }
  .top-row{display:flex; align-items:center; justify-content:space-between;}
  .tag{
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.6);
    opacity:0;
    transition:opacity .35s ease;
  }
  .zone:hover .tag, .zone:focus-visible .tag, .zone.selected .tag{ opacity:1; }
  .dot{
    width:8px;height:8px;border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.45);
    transition:background .3s ease, border-color .3s ease, box-shadow .3s ease;
    flex-shrink:0;
  }

  .panel{
    position:relative;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.18);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-radius:10px;
    padding:10px 12px;
    transform:translateY(14px);
    opacity:0;
    transition:transform .4s cubic-bezier(.2,.8,.2,1), opacity .4s ease;
  }
  .zone:hover .panel, .zone:focus-visible .panel, .zone.selected .panel{ transform:translateY(0); opacity:1; }
  .role-name{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:18px;
    text-transform:uppercase;
    letter-spacing:.02em;
    margin:0 0 2px;
  }
  .role-desc{
    font-size:11px;
    line-height:1.4;
    color:rgba(255,255,255,0.68);
    margin:0;
  }

  .zone[data-role="jugador"] .light{ background:radial-gradient(ellipse,#7f77dd,transparent 70%); }
  .zone[data-role="jugador"]:hover .dot, .zone[data-role="jugador"].selected .dot{ background:#afa9ec; border-color:#afa9ec; box-shadow:0 0 8px #afa9ec; }
  .zone[data-role="jugador"] .panel{ border-color:rgba(127,119,221,.4); }

  .zone[data-role="arbitro"] .light{ background:radial-gradient(ellipse,#e24b4a,transparent 70%); }
  .zone[data-role="arbitro"]:hover .dot, .zone[data-role="arbitro"].selected .dot{ background:#e24b4a; border-color:#e24b4a; box-shadow:0 0 8px #e24b4a; }
  .zone[data-role="arbitro"] .panel{ border-color:rgba(226,75,74,.4); }

  .zone[data-role="organizador"] .light{ background:radial-gradient(ellipse,#3fc8ff,transparent 70%); }
  .zone[data-role="organizador"]:hover .dot, .zone[data-role="organizador"].selected .dot{ background:#8fe0ff; border-color:#8fe0ff; box-shadow:0 0 8px #8fe0ff; }
  .zone[data-role="organizador"] .panel{ border-color:rgba(180,178,169,.4); }

  footer{ display:flex; justify-content:center; margin-top:28px; }
  .continue{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:13px 40px;
    background:#e8bd5f;
    color:#1a1230;
    border:none;
    border-radius:6px;
    cursor:pointer;
    opacity:.35;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
  }
  .continue.ready{ opacity:1; pointer-events:auto; }
  .continue.ready:hover{ transform:translateY(-2px); }
</style>

    <div class="zones">


      <button type="button" class="zone" data-role="jugador" aria-label="Jugador">
        <span class="spot"></span>
        <span class="light"></span>
        <div class="content">
          <div class="top-row"><span class="tag">Rol 01</span><span class="dot"></span></div>
          <div class="panel">
            <p class="role-name">Jugador</p>
            <p class="role-desc">Equipo, partidos y estadísticas.</p>
          </div>
        </div>
      </button>

      <button type="button" class="zone" data-role="arbitro" aria-label="Árbitro">
        <span class="spot"></span>
        <span class="light"></span>
        <div class="content">
          <div class="top-row"><span class="tag">Rol 02</span><span class="dot"></span></div>
          <div class="panel">
            <p class="role-name">Árbitro</p>
            <p class="role-desc">Marcador, tiempo y sanciones en vivo.</p>
          </div>
        </div>
      </button>

      <button type="button" class="zone" data-role="organizador" aria-label="Organizador">
        <span class="spot"></span>
        <span class="light"></span>
        <div class="content">
          <div class="top-row"><span class="tag">Rol 03</span><span class="dot"></span></div>
          <div class="panel">
            <p class="role-name">Organizador</p>

          </div>
        </div>
      </button>

  <footer>
    <button type="button" class="continue" id="continueBtn">Continuar</button>
  </footer>
</div>

<script>
  const zones = document.querySelectorAll('.zone');
  const continueBtn = document.getElementById('continueBtn');
  const heroImgs = document.querySelectorAll('.hero-img');
  const heroTitle = document.getElementById('heroTitle');
  const heroSub = document.getElementById('heroSub');
  const heroEyebrow = document.getElementById('heroEyebrow');
  const heroGlow = document.getElementById('heroGlow');

  const ROLES = {
    jugador: { name:'Jugador', sub:'Consulta tu equipo, próximos partidos y estadísticas personales.', color:'#7f77dd' },
    arbitro: { name:'Árbitro', sub:'Controla el marcador, el tiempo y las sanciones durante los partidos en vivo.', color:'#e24b4a' },
    organizador: { name:'Organizador', sub:'Gestiona equipos, calendario y configuración general del torneo.', color:'#3fc8ff' }
  };

  const defaultState = {
    eyebrow:'Escuela Colombiana de Ingeniería Julio Garavito',
    title:'TECH<span>CUP</span>',
    sub:'Pasa el mouse sobre un rol para verlo aquí, y haz clic para elegirlo.'
  };

  let selected = null;

  function showHero(role){
    heroImgs.forEach(img => img.classList.toggle('active', img.dataset.for === role));
    const r = ROLES[role];
    heroTitle.innerHTML = r.name;
    heroSub.textContent = r.sub;
    heroEyebrow.textContent = 'Rol seleccionado';
    heroGlow.style.background = `radial-gradient(circle, ${r.color}, transparent 70%)`;
  }

  function resetHero(){
    heroImgs.forEach(img => img.classList.remove('active'));
    heroTitle.innerHTML = defaultState.title;
    heroSub.textContent = defaultState.sub;
    heroEyebrow.textContent = defaultState.eyebrow;
    heroGlow.style.background = `radial-gradient(circle, #7f77dd, transparent 70%)`;
  }

  zones.forEach(z => {
    z.addEventListener('mouseenter', () => showHero(z.dataset.role));
    z.addEventListener('focus', () => showHero(z.dataset.role));
    z.addEventListener('mouseleave', () => { if (selected) showHero(selected); else resetHero(); });
    z.addEventListener('blur', () => { if (selected) showHero(selected); else resetHero(); });
    z.addEventListener('click', () => {
      zones.forEach(x => x.classList.remove('selected'));
      z.classList.add('selected');
      selected = z.dataset.role;
      showHero(selected);
      window.parent.postMessage({ type: "roleSelected", role: selected }, "*");
    });
  });

  continueBtn.addEventListener('click', () => {
    if (!selected) return;
    window.parent.postMessage({ type: "roleSelected", role: selected }, "*");
  });
</script>
</body>
