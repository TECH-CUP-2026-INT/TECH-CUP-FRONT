apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payments-api-ingress
  namespace: payments
  labels:
    app: payments-api
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /payment-orders
            pathType: Prefix
            backend:
              service:
                name: payments-api
                port:
                  number: 8080
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: payments-api
                port:
                  number: 8080
          - path: /payment-methods
            pathType: Prefix
            backend:
              service:
                name: payments-api
                port:
                  number: 8080
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: payments-api
                port:
                  number: 8080
          - path: /v3
            pathType: Prefix
            backend:
              service:
                name: payments-api
                port:
                  number: 8080
